<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="블록카운터">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>블록카운터</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <div class="topbar">
    <div class="tabs">
      <button class="tab-btn" id="tabBtn-plan" onclick="switchTab('plan')">계획</button>
      <button class="tab-btn active" id="tabBtn-todo" onclick="switchTab('todo')">할일</button>
      <button class="tab-btn" id="tabBtn-watch" onclick="switchTab('watch')">감상</button>
      <button class="tab-btn" id="tabBtn-memo" onclick="switchTab('memo')">메모</button>
      <button class="tab-btn" id="tabBtn-game" onclick="switchTab('game')">게임</button>
    </div>
    <div class="topbar-actions">
      <button class="ghost-btn icon-only" id="reorderToggle" onclick="toggleReorder()" aria-pressed="false" aria-label="순서 변경">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <button class="ghost-btn icon-only" onclick="openMenu()" aria-label="더보기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
      </button>
    </div>
  </div>

  <!-- ============ PLAN PAGE ============ -->
  <div class="page hidden" id="page-plan">
    <div class="subtabs">
      <button class="subtab-btn active" id="planSubtab-time" onclick="switchPlanSubtab('time')">시간순</button>
      <button class="subtab-btn" id="planSubtab-unspecified" onclick="switchPlanSubtab('unspecified')">시간미지정</button>
      <button class="subtab-btn" id="planSubtab-period" onclick="switchPlanSubtab('period')">기간계획</button>
    </div>

    <div class="page-bar">
      <span class="page-bar-title">계획</span>
      <div class="page-bar-actions">
        <button class="btn-secondary hidden" id="periodAddBtn" onclick="openPeriodPlanAdd()">+ 기간계획</button>
        <button class="btn-add" id="planAddBtn" onclick="openPlanAdd()" aria-label="계획 추가">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          추가
        </button>
      </div>
    </div>
    <div id="planList" class="list"></div>
  </div>

  <div class="page" id="page-todo">
    <div class="day-bar">
      <button class="day-nav" id="dayPrevBtn" onclick="changeDay(-1)" aria-label="이전 날">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="day-label-wrap">
        <div class="day-label" id="dayLabel">오늘</div>
        <div class="day-date" id="dayDate"></div>
      </div>
      <button class="day-nav" id="dayNextBtn" onclick="changeDay(1)" aria-label="다음 날">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="today-jump" id="todayJumpBtn" onclick="jumpToday()">오늘로</button>
    </div>

    <div class="score-card" id="scoreCard"></div>

    <div class="page-bar">
      <span class="page-bar-title">블록</span>
      <div class="page-bar-actions">
        <button class="btn-add" onclick="openBlockAdd()" aria-label="블록 추가">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          추가
        </button>
      </div>
    </div>
    <div id="blockList" class="list"></div>
  </div>

  <!-- ============ WATCH (감상) PAGE ============ -->
  <div class="page hidden" id="page-watch">
    <div class="day-bar">
      <button class="day-nav" id="watchDayPrevBtn" onclick="changeWatchDay(-1)" aria-label="이전 날">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="day-label-wrap">
        <div class="day-label" id="watchDayLabel">오늘</div>
        <div class="day-date" id="watchDayDate"></div>
      </div>
      <button class="day-nav" id="watchDayNextBtn" onclick="changeWatchDay(1)" aria-label="다음 날">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="today-jump" id="watchTodayJumpBtn" onclick="jumpWatchToday()">오늘로</button>
    </div>

    <div class="page-bar">
      <span class="page-bar-title">감상</span>
      <div class="page-bar-actions">
        <button class="btn-add" onclick="openWatchAdd()" aria-label="감상 추가">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          추가
        </button>
      </div>
    </div>
    <div id="watchList" class="list"></div>
  </div>

  <!-- ============ MEMO PAGE ============ -->
  <div class="page hidden" id="page-memo">
    <div class="day-bar">
      <button class="day-nav" id="memoDayPrevBtn" onclick="changeMemoDay(-1)" aria-label="이전 날">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="day-label-wrap">
        <div class="day-label" id="memoDayLabel">오늘</div>
        <div class="day-date" id="memoDayDate"></div>
      </div>
      <button class="day-nav" id="memoDayNextBtn" onclick="changeMemoDay(1)" aria-label="다음 날">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="today-jump" id="memoTodayJumpBtn" onclick="jumpMemoToday()">오늘로</button>
    </div>
    <div id="memoList" class="memo-list"></div>
    <div class="memo-input-bar">
      <textarea id="memoInput" class="memo-input" placeholder="메모 입력..." rows="1" oninput="autoGrowMemoInput(this)"></textarea>
      <button class="memo-send-btn" onclick="sendMemo()" aria-label="전송">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <!-- ============ GAME PAGE ============ -->
  <div class="page hidden" id="page-game" style="overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(20px + var(--safe-bottom))">
    <div class="game-points-card">
      <div class="game-points-label">누적 포인트</div>
      <div class="game-points-num" id="gamePointsNum">0</div>
      <div class="game-points-hint">매일의 종합 점수가 합산돼요</div>
      <div class="game-btns-row">
        <button class="btn-secondary game-recalc-btn" onclick="recalcGamePoints()">현재 기록으로 다시 계산</button>
        <button class="btn-add game-spend-btn" onclick="openSpendOverlay()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          소모하기
        </button>
      </div>
    </div>
    <div class="game-ledger-wrap">
      <div class="game-ledger-title">소모 내역</div>
      <div id="gameLedger" class="game-ledger"></div>
    </div>
  </div>

  <div id="install-banner">
    <span>홈 화면에 추가하면 앱처럼 사용할 수 있어요</span>
    <button onclick="installApp()">설치</button>
  </div>
</div>

<!-- ============ BLOCK FORM SHEET ============ -->
<div class="overlay" id="blockFormOverlay" onclick="overlayClose(event,'blockFormOverlay')">
  <div class="sheet sheet-tall">
    <div class="sheet-handle"></div>
    <h2 id="blockSheetTitle">블록 추가</h2>

    <div class="field">
      <label>제목</label>
      <input type="text" id="bfName" placeholder="예: 아침 운동" maxlength="40" autocomplete="off">
    </div>

    <div class="field">
      <label>유형</label>
      <div class="seg-group" id="bfTypeGroup">
        <button class="seg-btn" data-val="schedule" onclick="selectSeg('bfTypeGroup',this)">일정</button>
        <button class="seg-btn" data-val="once" onclick="selectSeg('bfTypeGroup',this)">일회성</button>
        <button class="seg-btn" data-val="todo" onclick="selectSeg('bfTypeGroup',this)">할일</button>
        <button class="seg-btn" data-val="leisure" onclick="selectSeg('bfTypeGroup',this)">여가</button>
        <button class="seg-btn" data-val="routine" onclick="selectSeg('bfTypeGroup',this)">루틴</button>
      </div>
    </div>

    <div class="field">
      <label>시간대</label>
      <div class="seg-group" id="bfTimeGroup">
        <button class="seg-btn" data-val="none" onclick="selectSeg('bfTimeGroup',this); toggleCustomTime(); toggleSplitFields()">미지정</button>
        <button class="seg-btn" data-val="morning" onclick="selectSeg('bfTimeGroup',this); toggleCustomTime(); toggleSplitFields()">오전</button>
        <button class="seg-btn" data-val="afternoon" onclick="selectSeg('bfTimeGroup',this); toggleCustomTime(); toggleSplitFields()">오후</button>
        <button class="seg-btn" data-val="night" onclick="selectSeg('bfTimeGroup',this); toggleCustomTime(); toggleSplitFields()">밤</button>
        <button class="seg-btn" data-val="custom" onclick="selectSeg('bfTimeGroup',this); toggleCustomTime(); toggleSplitFields()">시간 지정</button>
        <button class="seg-btn" data-val="split" onclick="selectSeg('bfTimeGroup',this); toggleCustomTime(); toggleSplitFields()">쪼개기</button>
      </div>
      <input type="time" id="bfCustomTime" class="hidden" style="margin-top:8px;">
    </div>

    <div class="field hidden" id="bfSplitFields">
      <label>쪼개기 설정</label>
      <div class="split-total-row">
        <span class="split-label-text">총 카운트 수</span>
        <input type="number" id="bfSplitTotal" placeholder="예: 30" min="1" max="9999" inputmode="numeric" style="width:100px;">
      </div>
      <div id="bfSplitDates" class="split-dates-list" style="margin-top:10px;"></div>
      <button class="btn-secondary" style="width:100%;margin-top:8px;" onclick="addSplitDate()">+ 날짜별 배분 추가</button>
    </div>

    <div class="field">
      <label>설명 (선택)</label>
      <input type="text" id="bfDesc" placeholder="메모나 세부 내용" maxlength="100" autocomplete="off">
    </div>

    <div class="field">
      <label>진행 체크 방식</label>
      <div class="seg-group" id="bfProgressGroup">
        <button class="seg-btn" data-val="counter" onclick="selectSeg('bfProgressGroup',this); toggleCounterFields()">카운터</button>
        <button class="seg-btn" data-val="toggle" onclick="selectSeg('bfProgressGroup',this); toggleCounterFields()">완료 토글</button>
        <button class="seg-btn" data-val="none" onclick="selectSeg('bfProgressGroup',this); toggleCounterFields()">없음</button>
      </div>
    </div>

    <div class="field hidden" id="bfCounterFields">
      <label>목표 수</label>
      <input type="number" id="bfTotal" placeholder="예: 5" min="1" max="9999" inputmode="numeric">
      <label style="margin-top:10px;">현재 진행 수</label>
      <input type="number" id="bfCurrent" placeholder="예: 0" min="0" max="9999" inputmode="numeric">
    </div>

    <div class="field" id="bfCarryoverField">
      <label class="carryover-label">
        <input type="checkbox" id="bfCarryover">
        <span>이행</span>
      </label>
    </div>

    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeOverlay('blockFormOverlay')">취소</button>
      <button class="btn-save" onclick="submitBlockForm()">저장</button>
    </div>
  </div>
</div>

<!-- ============ FOCUS TIMER SHEET ============ -->
<div class="overlay" id="timerOverlay" onclick="overlayClose(event,'timerOverlay')">
  <div class="sheet sheet-tall">
    <div class="sheet-handle"></div>
    <h2 id="timerSheetTitle">집중 시간 재기</h2>

    <div class="timer-display" id="timerDisplay">00:00:00</div>
    <div class="timer-status" id="timerStatus">대기 중</div>

    <div class="timer-controls">
      <button class="timer-btn timer-btn-start" id="timerStartBtn" onclick="timerStart()">시작</button>
      <button class="timer-btn timer-btn-pause hidden" id="timerPauseBtn" onclick="timerPause()">일시정지</button>
      <button class="timer-btn timer-btn-resume hidden" id="timerResumeBtn" onclick="timerResume()">계속</button>
      <button class="timer-btn timer-btn-stop hidden" id="timerStopBtn" onclick="timerStop()">기록 끝</button>
    </div>

    <div class="timer-manual-toggle" onclick="toggleManualEntry()">
      <span id="manualToggleLabel">+ 직접 시작·종료 시간으로 추가</span>
    </div>

    <div class="field hidden" id="manualEntryFields">
      <label>시작 시간</label>
      <input type="time" id="manualStart">
      <label style="margin-top:10px;">종료 시간</label>
      <input type="time" id="manualEnd">
      <button class="btn-secondary" style="width:100%;margin-top:10px;" onclick="addManualSession()">이 사이클 추가</button>
    </div>

    <div class="timer-session-list-wrap">
      <label class="timer-session-label">완료된 사이클</label>
      <div id="timerSessionList" class="timer-session-list"></div>
    </div>

    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeTimerSheet()">닫기</button>
    </div>
  </div>
</div>

<!-- ============ WATCH FORM SHEET ============ -->
<div class="overlay" id="watchFormOverlay" onclick="overlayClose(event,'watchFormOverlay')">
  <div class="sheet sheet-tall">
    <div class="sheet-handle"></div>
    <h2 id="watchSheetTitle">감상 추가</h2>

    <div class="field">
      <label>제목</label>
      <input type="text" id="wfName" placeholder="예: 듄 파트2" maxlength="60" autocomplete="off">
    </div>

    <div class="field">
      <label>저자 (선택)</label>
      <input type="text" id="wfAuthor" placeholder="예: 드니 빌뇌브" maxlength="40" autocomplete="off">
    </div>

    <div class="field">
      <label>유형</label>
      <div class="seg-group" id="wfTypeGroup">
        <button class="seg-btn" data-val="book" onclick="selectSeg('wfTypeGroup',this)">독서</button>
        <button class="seg-btn" data-val="movie" onclick="selectSeg('wfTypeGroup',this)">영화</button>
        <button class="seg-btn" data-val="etc" onclick="selectSeg('wfTypeGroup',this)">기타</button>
      </div>
    </div>

    <div class="field">
      <label>진행도 (%)</label>
      <input type="number" id="wfProgress" placeholder="예: 0" min="0" max="100" inputmode="numeric">
    </div>

    <div class="field" id="wfArchiveField">
      <label class="carryover-label">
        <input type="checkbox" id="wfArchive">
        <span>보관</span>
      </label>
    </div>

    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeOverlay('watchFormOverlay')">취소</button>
      <button class="btn-save" onclick="submitWatchForm()">저장</button>
    </div>
  </div>
</div>

<!-- ============ WATCH PROGRESS EDIT POPUP ============ -->
<div class="overlay" id="watchProgressOverlay" onclick="overlayClose(event,'watchProgressOverlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 id="watchProgressTitle">진행도 수정</h2>
    <div class="field">
      <label>진행도 (%)</label>
      <input type="number" id="wpProgressInput" min="0" max="100" inputmode="numeric">
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeOverlay('watchProgressOverlay')">취소</button>
      <button class="btn-save" onclick="submitWatchProgress()">적용</button>
    </div>
  </div>
</div>

<!-- ============ WATCH MEMO SHEET ============ -->
<div class="overlay" id="watchMemoOverlay" onclick="overlayClose(event,'watchMemoOverlay')">
  <div class="sheet sheet-tall">
    <div class="sheet-handle"></div>
    <h2 id="watchMemoTitle">감상 메모</h2>
    <div id="watchMemoList" class="memo-list watch-memo-list"></div>
    <div class="memo-input-bar watch-memo-input-bar">
      <textarea id="watchMemoInput" class="memo-input" placeholder="감상 메모 입력..." rows="1" oninput="autoGrowMemoInput(this)" onkeydown="handleWatchMemoKeydown(event)"></textarea>
      <button class="memo-send-btn" onclick="sendWatchMemo()" aria-label="전송">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeOverlay('watchMemoOverlay')">닫기</button>
    </div>
  </div>
</div>

<!-- ============ PLAN FORM SHEET ============ -->
<div class="overlay" id="planFormOverlay" onclick="overlayClose(event,'planFormOverlay')">
  <div class="sheet sheet-tall">
    <div class="sheet-handle"></div>
    <h2 id="planSheetTitle">계획 추가</h2>

    <div class="field">
      <label>제목</label>
      <input type="text" id="pfName" placeholder="예: 발표 자료 준비" maxlength="40" autocomplete="off">
    </div>

    <div class="field">
      <label>유형</label>
      <div class="seg-group" id="pfTypeGroup">
        <button class="seg-btn" data-val="unspecified" onclick="selectSeg('pfTypeGroup',this)">미지정</button>
        <button class="seg-btn" data-val="schedule" onclick="selectSeg('pfTypeGroup',this)">일정</button>
        <button class="seg-btn" data-val="once" onclick="selectSeg('pfTypeGroup',this)">일회성</button>
        <button class="seg-btn" data-val="todo" onclick="selectSeg('pfTypeGroup',this)">할일</button>
        <button class="seg-btn" data-val="leisure" onclick="selectSeg('pfTypeGroup',this)">여가</button>
        <button class="seg-btn" data-val="routine" onclick="selectSeg('pfTypeGroup',this)">루틴</button>
      </div>
    </div>

    <div class="field">
      <label>시간</label>
      <div class="seg-group" id="pfTimeModeGroup">
        <button class="seg-btn" data-val="unspecified" onclick="selectSeg('pfTimeModeGroup',this); onPlanTimeModeChanged()">시간미지정</button>
        <button class="seg-btn" data-val="specified" onclick="selectSeg('pfTimeModeGroup',this); onPlanTimeModeChanged()">시간 지정</button>
      </div>
      <div class="hidden" id="pfTimeFields" style="margin-top:10px;">
        <label>날짜 (범위 지정 가능)</label>
        <div class="range-row">
          <input type="date" id="pfDateStart">
          <span class="range-sep">~</span>
          <input type="date" id="pfDateEnd">
        </div>
        <label style="margin-top:10px;">시간 (선택, 범위 지정 가능)</label>
        <div class="range-row">
          <input type="time" id="pfTimeStart">
          <span class="range-sep">~</span>
          <input type="time" id="pfTimeEnd">
        </div>
      </div>
    </div>

    <div class="field">
      <label>설명 (선택)</label>
      <input type="text" id="pfDesc" placeholder="메모나 세부 내용" maxlength="100" autocomplete="off">
    </div>

    <div class="field">
      <label>진행 체크 방식</label>
      <div class="seg-group" id="pfProgressGroup">
        <button class="seg-btn" data-val="counter" onclick="selectSeg('pfProgressGroup',this); togglePlanCounterFields()">카운터</button>
        <button class="seg-btn" data-val="toggle" onclick="selectSeg('pfProgressGroup',this); togglePlanCounterFields()">완료 토글</button>
        <button class="seg-btn" data-val="none" onclick="selectSeg('pfProgressGroup',this); togglePlanCounterFields()">없음</button>
      </div>
    </div>

    <div class="field hidden" id="pfCounterFields">
      <label>목표 수</label>
      <input type="number" id="pfTotal" placeholder="예: 5" min="1" max="9999" inputmode="numeric">
      <label style="margin-top:10px;">현재 진행 수</label>
      <input type="number" id="pfCurrent" placeholder="예: 0" min="0" max="9999" inputmode="numeric">
    </div>

    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeOverlay('planFormOverlay')">취소</button>
      <button class="btn-save" onclick="submitPlanForm()">저장</button>
    </div>
  </div>
</div>

<!-- ============ PERIOD PLAN FORM SHEET ============ -->
<div class="overlay" id="periodFormOverlay" onclick="overlayClose(event,'periodFormOverlay')">
  <div class="sheet sheet-tall">
    <div class="sheet-handle"></div>
    <h2 id="periodSheetTitle">기간계획 추가</h2>

    <div class="field">
      <label>기간 종류</label>
      <div class="seg-group" id="ppModeGroup">
        <button class="seg-btn" data-val="month" onclick="selectSeg('ppModeGroup',this); onPeriodModeChanged()">월</button>
        <button class="seg-btn" data-val="week" onclick="selectSeg('ppModeGroup',this); onPeriodModeChanged()">주</button>
        <button class="seg-btn" data-val="range" onclick="selectSeg('ppModeGroup',this); onPeriodModeChanged()">날짜범위</button>
      </div>
    </div>

    <div class="field hidden" id="ppMonthField">
      <label>월 선택</label>
      <input type="month" id="ppMonthInput">
    </div>
    <div class="field hidden" id="ppWeekField">
      <label>주 선택</label>
      <input type="week" id="ppWeekInput">
    </div>
    <div class="field hidden" id="ppRangeField">
      <label>날짜 범위</label>
      <div class="range-row">
        <input type="date" id="ppRangeStart">
        <span class="range-sep">~</span>
        <input type="date" id="ppRangeEnd">
      </div>
    </div>

    <div class="field">
      <label>설명 (선택)</label>
      <input type="text" id="ppDesc" placeholder="이 기간의 목표나 메모" maxlength="200" autocomplete="off">
    </div>

    <div class="field">
      <label>참조한 블록</label>
      <div id="ppRefList" class="ref-list"></div>
      <button class="btn-secondary" style="width:100%;margin-top:8px;" onclick="openRefPicker()">+ 블록 참조 추가</button>
    </div>

    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeOverlay('periodFormOverlay')">취소</button>
      <button class="btn-save" onclick="submitPeriodForm()">저장</button>
    </div>
  </div>
</div>

<!-- ============ REFERENCE PICKER SHEET ============ -->
<div class="overlay" id="refPickerOverlay" onclick="overlayClose(event,'refPickerOverlay')">
  <div class="sheet sheet-tall">
    <div class="sheet-handle"></div>
    <h2>블록 참조 선택</h2>
    <div id="refPickerList" class="ref-picker-list"></div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeOverlay('refPickerOverlay')">닫기</button>
    </div>
  </div>
</div>

<!-- ============ IMPORT TO TODO POPUP ============ -->
<div class="overlay" id="importPopupOverlay" onclick="overlayClose(event,'importPopupOverlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>할일로 보내기</h2>
    <div class="sheet-actions" style="flex-direction:column;gap:8px;margin-top:4px;">
      <button class="btn-secondary" style="width:100%;" onclick="sendPlanToDate('today')">오늘로</button>
      <button class="btn-secondary" style="width:100%;" onclick="sendPlanToDate('tomorrow')">내일로</button>
    </div>
    <div class="field" style="margin-top:14px;">
      <label>날짜 지정</label>
      <div class="range-row">
        <input type="date" id="importDateInput">
        <button class="btn-save" style="flex:0 0 auto;padding:11px 16px;" onclick="sendPlanToDate('custom')">보내기</button>
      </div>
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeOverlay('importPopupOverlay')">취소</button>
    </div>
  </div>
</div>

<!-- ============ CONFIRM DELETE SHEET (generic) ============ -->
<div class="overlay" id="confirmOverlay" onclick="overlayClose(event,'confirmOverlay')">
  <div class="sheet confirm-sheet">
    <div class="sheet-handle"></div>
    <p id="confirmMsg"></p>
    <button class="btn-delete" id="confirmOkBtn">삭제</button>
    <button class="btn-keep" onclick="closeOverlay('confirmOverlay')">취소</button>
  </div>
</div>

<!-- ============ GAME SPEND SHEET ============ -->
<div class="overlay" id="spendOverlay" onclick="overlayClose(event,'spendOverlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>포인트 소모</h2>
    <div class="field">
      <label>소모 포인트</label>
      <input type="number" id="spendAmount" placeholder="예: 500" min="1" inputmode="numeric">
    </div>
    <div class="field">
      <label>소모 이유</label>
      <input type="text" id="spendReason" placeholder="예: 영화 관람" maxlength="80" autocomplete="off">
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeOverlay('spendOverlay')">취소</button>
      <button class="btn-save" onclick="submitSpend()">소모</button>
    </div>
  </div>
</div>

<!-- ============ MENU SHEET (backup / settings) ============ -->
<div class="overlay" id="menuOverlay" onclick="overlayClose(event,'menuOverlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>더보기</h2>
    <button class="menu-item" onclick="exportBackup()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      전체 기록 백업 (내보내기)
    </button>
    <button class="menu-item" onclick="triggerImport()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      백업 불러오기 (가져오기)
    </button>
    <input type="file" id="importFile" accept="application/json" class="hidden" onchange="importBackup(event)">
    <h2 style="margin-top:20px;">가중치 설정</h2>
    <div class="weight-row"><span>일정</span><input type="number" id="wSchedule" min="0" max="100"></div>
    <div class="weight-row"><span>할일</span><input type="number" id="wTodo" min="0" max="100"></div>
    <div class="weight-row"><span>일회성</span><input type="number" id="wOnce" min="0" max="100"></div>
    <div class="weight-row"><span>여가</span><input type="number" id="wLeisure" min="0" max="100"></div>
    <div class="weight-row"><span>루틴</span><input type="number" id="wRoutine" min="0" max="100"></div>
    <div class="weight-row"><span>집중시간</span><input type="number" id="wFocus" min="0" max="100"></div>
    <div class="weight-row"><span>감상</span><input type="number" id="wWatch" min="0" max="100"></div>
    <div class="weight-row"><span>미지정</span><input type="number" id="wUnspecified" min="0" max="100"></div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeOverlay('menuOverlay')">닫기</button>
      <button class="btn-save" onclick="saveMenuSettings()">저장</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- ============ YESTERDAY FEEDBACK SHEET ============ -->
<div class="overlay" id="feedbackOverlay" onclick="overlayClose(event,'feedbackOverlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>어제 피드백</h2>
    <div id="feedbackBody" class="feedback-body">불러오는 중...</div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeOverlay('feedbackOverlay')">닫기</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
