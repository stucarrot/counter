<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="블록카운터">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>블록카운터</title>
<link rel="stylesheet" href="style.css">
<script>
  // CSS/app.js가 로드되기 전에 저장된 테마 선택을 즉시 <html>에 반영해 깜빡임을 방지
  (function() {
    try {
      var pref = localStorage.getItem('pc_theme_pref') || 'system';
      if (pref === 'light') document.documentElement.classList.add('theme-light');
      else if (pref === 'dark') document.documentElement.classList.add('theme-dark');
    } catch (e) {}
  })();
</script>
</head>
<body>

<div id="app">

  <!-- ============ PLAN PAGE ============ -->
  <div class="page hidden" id="page-plan">
    <div class="subtabs">
      <button class="subtab-btn active" id="planSubtab-time" onclick="switchPlanSubtab('time')">시간순</button>
      <button class="subtab-btn" id="planSubtab-unspecified" onclick="switchPlanSubtab('unspecified')">시간미지정</button>
      <button class="subtab-btn" id="planSubtab-period" onclick="switchPlanSubtab('period')">프로젝트</button>
    </div>

    <div class="page-bar">
      <span class="page-bar-title">계획</span>
      <div class="page-bar-actions">
        <button class="btn-secondary hidden" id="periodAddBtn" onclick="openPeriodPlanAdd()">+ 프로젝트</button>
        <button class="icon-btn search-btn" onclick="openSearch('plan')" aria-label="검색">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="btn-add" id="planAddBtn" onclick="openPlanAdd()" aria-label="계획 추가">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          추가
        </button>
      </div>
    </div>
    <div id="planList" class="list"></div>
  </div>

  <div class="page" id="page-todo">
    <div class="day-bar">
      <button class="day-nav" id="dayPrevBtn" onclick="changeDay(-1)" aria-label="이전 날">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="day-label-wrap">
        <div class="day-label" id="dayLabel">오늘</div>
        <div class="day-date" id="dayDate"></div>
      </div>
      <button class="day-nav" id="dayNextBtn" onclick="changeDay(1)" aria-label="다음 날">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="today-jump" id="todayJumpBtn" onclick="jumpToday()">오늘로</button>
    </div>

    <div class="page-bar">
      <span class="page-bar-title">블록</span>
      <div class="page-bar-actions">
        <button class="icon-btn search-btn" onclick="openSearch('todo')" aria-label="검색">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="icon-btn" onclick="openMiniAlarmAdd()" aria-label="미니 알림 추가">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l3 2"/><path d="M5 3 2 6M22 6l-3-3"/></svg>
        </button>
        <button class="btn-add" onclick="openBlockAdd()" aria-label="블록 추가">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          추가
        </button>
      </div>
    </div>
    <div id="activeTimerBanner" class="active-timer-banner"></div>
    <div id="miniAlarmList" class="mini-alarm-list hidden"></div>
    <div id="blockList" class="list"></div>
  </div>

  <!-- ============ WATCH (감상) PAGE ============ -->
  <div class="page hidden" id="page-watch">
    <div class="subtabs">
      <button class="subtab-btn active" id="watchSubtab-ongoing" onclick="switchWatchSubtab('ongoing')">감상</button>
      <button class="subtab-btn" id="watchSubtab-planned" onclick="switchWatchSubtab('planned')">예정</button>
      <button class="subtab-btn" id="watchSubtab-archive" onclick="switchWatchSubtab('archive')">종료</button>
      <button class="subtab-btn" id="watchSubtab-list" onclick="switchWatchSubtab('list')">목록</button>
    </div>

    <div class="day-bar" id="watchDayBar">
      <button class="day-nav" id="watchDayPrevBtn" onclick="changeWatchDay(-1)" aria-label="이전 날">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="day-label-wrap">
        <div class="day-label" id="watchDayLabel">오늘</div>
        <div class="day-date" id="watchDayDate"></div>
      </div>
      <button class="day-nav" id="watchDayNextBtn" onclick="changeWatchDay(1)" aria-label="다음 날">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="today-jump" id="watchTodayJumpBtn" onclick="jumpWatchToday()">오늘로</button>
    </div>

    <div class="page-bar">
      <span class="page-bar-title" id="watchPageBarTitle">감상</span>
      <div class="page-bar-actions">
        <button class="icon-btn search-btn" onclick="openSearch('watch')" aria-label="검색">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="btn-add" id="watchAddBtn" onclick="openWatchAdd()" aria-label="감상 추가">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          추가
        </button>
        <button class="btn-add hidden" id="watchListAddBtn" onclick="openWatchListAdd()" aria-label="목록 추가">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          추가
        </button>
      </div>
    </div>
    <div id="watchList" class="list"></div>
  </div>

  <!-- ============ MEMO PAGE ============ -->
  <div class="page hidden" id="page-memo">
    <div class="day-bar">
      <button class="day-nav" id="memoDayPrevBtn" onclick="changeMemoDay(-1)" aria-label="이전 날">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="day-label-wrap">
        <div class="day-label" id="memoDayLabel">오늘</div>
        <div class="day-date" id="memoDayDate"></div>
      </div>
      <button class="day-nav" id="memoDayNextBtn" onclick="changeMemoDay(1)" aria-label="다음 날">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="today-jump" id="memoTodayJumpBtn" onclick="jumpMemoToday()">오늘로</button>
    </div>
    <div id="pinnedMemoList" class="pinned-memo-list"></div>
    <div id="memoList" class="memo-list"></div>
    <div class="memo-input-bar">
      <textarea id="memoInput" class="memo-input" placeholder="메모 입력..." rows="1" oninput="autoGrowMemoInput(this)"></textarea>
      <button class="memo-send-btn" onclick="sendMemo()" aria-label="전송">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <button class="memo-archive-fab" onclick="openMemoArchive()" aria-label="메모 보관함">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="4" rx="1"/><path d="M5 8v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
    </button>
  </div>

  <!-- ============ MEMO ARCHIVE PAGE (full page) ============ -->
  <div class="full-page hidden" id="page-memo-archive">
    <div class="page-bar">
      <span class="page-bar-title">메모 보관함</span>
    </div>
    <div class="memo-archive-toolbar">
      <input type="text" id="memoArchiveSearch" placeholder="보관한 메모 검색" autocomplete="off" oninput="renderMemoArchiveList()">
      <button class="memo-archive-sort-btn" id="memoArchiveSortBtn" onclick="toggleMemoArchiveSort()">최신순</button>
    </div>
    <div id="memoArchiveList" class="memo-list memo-archive-list"></div>
    <button class="memo-archive-fab" onclick="closeMemoArchive()" aria-label="메모로 돌아가기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </button>
  </div>

  <!-- ============ GAME PAGE ============ -->
  <div id="install-banner">
    <span>홈 화면에 추가하면 앱처럼 사용할 수 있어요</span>
    <button onclick="installApp()">설치</button>
  </div>

  <div class="bottombar">
    <div class="bottom-tabs">
      <button class="tab-btn" id="tabBtn-plan" onclick="switchTab('plan')">계획</button>
      <button class="tab-btn active" id="tabBtn-todo" onclick="switchTab('todo')">할일</button>
      <button class="tab-btn" id="tabBtn-watch" onclick="switchTab('watch')">감상</button>
      <button class="tab-btn" id="tabBtn-memo" onclick="switchTab('memo')">메모</button>
    </div>
    <div class="bottombar-actions">
      <button class="ghost-btn icon-only" id="simpleViewToggle" onclick="toggleSimpleView()" aria-pressed="false" aria-label="간단 보기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="18" rx="1.5"/><rect x="14" y="3" width="7" height="18" rx="1.5"/></svg>
      </button>
      <button class="ghost-btn icon-only" id="reorderToggle" onclick="toggleReorder()" aria-pressed="false" aria-label="순서 변경">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <button class="ghost-btn icon-only" onclick="openMenu()" aria-label="더보기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ============ BLOCK FORM SHEET ============ -->
<!-- ============ MINI ALARM FORM (미니 시간 알림) ============ -->
<div class="overlay" id="miniAlarmFormOverlay" onclick="overlayClose(event,'miniAlarmFormOverlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 id="miniAlarmSheetTitle">알림 추가</h2>

    <div class="field">
      <label>제목</label>
      <input type="text" id="maTitle" placeholder="예: 약 먹기" maxlength="30" autocomplete="off">
    </div>

    <div class="field">
      <label>시간</label>
      <input type="time" id="maTime">
    </div>

    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeOverlay('miniAlarmFormOverlay')">취소</button>
      <button class="btn-save" onclick="submitMiniAlarmForm()">저장</button>
    </div>
  </div>
</div>

<div class="overlay" id="blockFormOverlay" onclick="overlayClose(event,'blockFormOverlay')">
  <div class="sheet sheet-tall">
    <div class="sheet-handle"></div>
    <h2 id="blockSheetTitle">블록 추가</h2>

    <div class="field">
      <label>제목</label>
      <input type="text" id="bfName" placeholder="예: 아침 운동" maxlength="40" autocomplete="off">
    </div>

    <div class="field">
      <label>유형</label>
      <div class="seg-group" id="bfTypeGroup">
        <button class="seg-btn" data-val="schedule" onclick="selectSeg('bfTypeGroup',this)">일정</button>
        <button class="seg-btn" data-val="once" onclick="selectSeg('bfTypeGroup',this)">일회성</button>
        <button class="seg-btn" data-val="todo" onclick="selectSeg('bfTypeGroup',this)">할일</button>
        <button class="seg-btn" data-val="leisure" onclick="selectSeg('bfTypeGroup',this)">여가</button>
        <button class="seg-btn" data-val="routine" onclick="selectSeg('bfTypeGroup',this)">루틴</button>
        <button class="seg-btn" data-val="abstain" onclick="selectSeg('bfTypeGroup',this)">절제</button>
      </div>
    </div>

    <div class="field" id="bfColorField">
      <label>색상 (선택)</label>
      <div class="color-swatch-row" id="bfColorSwatches">
        <button type="button" class="color-swatch color-swatch-default" id="bfColorDefaultSwatch" data-color="" onclick="selectBlockColor('')" aria-label="기본 색"></button>
        <button type="button" class="color-swatch color-swatch-custom" id="bfColorCustomSwatch" onclick="document.getElementById('bfColorPicker').click()" aria-label="색 직접 고르기">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c1.1 0 2-.9 2-2 0-.5-.2-1-.5-1.4-.3-.4-.5-.8-.5-1.4 0-1.1.9-2 2-2h2.4c2 0 3.6-1.6 3.6-3.6C21 6.8 17.1 2 12 2z"/></svg>
        </button>
        <input type="color" id="bfColorPicker" class="color-picker-hidden" oninput="selectBlockColor(this.value)">
      </div>
    </div>

    <div class="field" id="bfTimeField">
      <label>시간대</label>
      <div class="seg-group" id="bfTimeGroup">
        <button class="seg-btn" data-val="none" onclick="selectSeg('bfTimeGroup',this); toggleCustomTime(); toggleSplitFields()">미지정</button>
        <button class="seg-btn" data-val="morning" onclick="selectSeg('bfTimeGroup',this); toggleCustomTime(); toggleSplitFields()">오전</button>
        <button class="seg-btn" data-val="afternoon" onclick="selectSeg('bfTimeGroup',this); toggleCustomTime(); toggleSplitFields()">오후</button>
        <button class="seg-btn" data-val="night" onclick="selectSeg('bfTimeGroup',this); toggleCustomTime(); toggleSplitFields()">밤</button>
        <button class="seg-btn" data-val="custom" onclick="selectSeg('bfTimeGroup',this); toggleCustomTime(); toggleSplitFields()">시간 지정</button>
        <button class="seg-btn" data-val="split" onclick="selectSeg('bfTimeGroup',this); toggleCustomTime(); toggleSplitFields()">쪼개기</button>
      </div>
      <div class="field hidden" id="bfCustomTimeField" style="margin-top:8px;">
        <div class="custom-time-input-row">
          <input type="time" id="bfCustomTimeInput">
          <button class="btn-secondary" onclick="addCustomTimeEntry('before')">이전</button>
          <button class="btn-secondary" onclick="addCustomTimeEntry('after')">이후</button>
          <button class="btn-secondary" onclick="addCustomTimeEntry('exact')">그냥추가</button>
        </div>
        <div id="bfCustomTimeList" class="custom-time-list"></div>
      </div>
    </div>

    <div class="field hidden" id="bfSplitFields">
      <label>쪼개기 설정</label>
      <div class="split-total-row">
        <span class="split-label-text">총 카운트 수</span>
        <input type="number" id="bfSplitTotal" placeholder="예: 30" min="1" max="9999" inputmode="numeric" style="width:100px;">
      </div>
      <div id="bfSplitDates" class="split-dates-list" style="margin-top:10px;"></div>
      <button class="btn-secondary" style="width:100%;margin-top:8px;" onclick="addSplitDate()">+ 날짜별 배분 추가</button>
    </div>

    <div class="field">
      <label>설명 (선택)</label>
      <input type="text" id="bfDesc" placeholder="메모나 세부 내용" maxlength="100" autocomplete="off">
    </div>

    <div class="field">
      <label>진행 체크 방식</label>
      <div class="seg-group" id="bfProgressGroup">
        <button class="seg-btn" data-val="counter" onclick="selectSeg('bfProgressGroup',this); toggleCounterFields()">카운터</button>
        <button class="seg-btn" data-val="toggle" onclick="selectSeg('bfProgressGroup',this); toggleCounterFields()">완료 토글</button>
        <button class="seg-btn hidden" id="bfProgressTimerBtn" data-val="timer" onclick="selectSeg('bfProgressGroup',this); toggleCounterFields()">시간재기</button>
        <button class="seg-btn" data-val="none" onclick="selectSeg('bfProgressGroup',this); toggleCounterFields()">없음</button>
      </div>
    </div>

    <div class="field hidden" id="bfCounterFields">
      <label id="bfTotalLabel">목표 수</label>
      <input type="number" id="bfTotal" placeholder="예: 5" min="1" max="9999" inputmode="numeric">
      <label style="margin-top:10px;">현재 진행 수</label>
      <input type="number" id="bfCurrent" placeholder="예: 0" min="0" max="9999" inputmode="numeric">
    </div>

    <div class="field hidden" id="bfTimerLimitFields">
      <label>소모 시간 상한</label>
      <div class="split-total-row">
        <input type="number" id="bfTimerLimitMinutes" placeholder="예: 60" min="1" max="9999" inputmode="numeric" style="width:100px;">
        <span class="split-label-text">분</span>
      </div>
      <p style="font-size:12px;color:var(--gray-400);margin:6px 0 0;">이 시간을 넘기면 점수에서 절제 감점값이 한 번에 빠져요.</p>
    </div>

    <div class="field" id="bfCarryoverField">
      <label class="carryover-label">
        <input type="checkbox" id="bfCarryover">
        <span>이행</span>
      </label>
    </div>

    <div class="field hidden" id="bfIntervalField">
      <label>반복 주기</label>
      <div class="split-total-row">
        <span class="split-label-text">매</span>
        <input type="number" id="bfIntervalDays" value="1" min="1" max="365" inputmode="numeric" style="width:80px;">
        <span class="split-label-text">일마다</span>
      </div>
    </div>

    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeOverlay('blockFormOverlay')">취소</button>
      <button class="btn-save" onclick="submitBlockForm()">저장</button>
    </div>
  </div>
</div>

<!-- ============ FOCUS TIMER SHEET ============ -->
<div class="overlay" id="timerOverlay" onclick="overlayClose(event,'timerOverlay')">
  <div class="sheet sheet-tall">
    <div class="sheet-handle"></div>
    <h2 id="timerSheetTitle">집중 시간 재기</h2>

    <div class="field" style="margin-bottom:14px;">
      <label>목표 시간 (선택)</label>
      <div class="split-total-row">
        <input type="number" id="timerGoalMinutes" placeholder="예: 30" min="1" max="9999" inputmode="numeric" style="width:100px;" onchange="setTimerGoalMinutes()">
        <span class="split-label-text">분</span>
      </div>
    </div>

    <div class="timer-display" id="timerDisplay">00:00:00</div>
    <div class="timer-status" id="timerStatus">대기 중</div>

    <div class="timer-controls">
      <button class="timer-btn timer-btn-start" id="timerStartBtn" onclick="timerStart()">시작</button>
      <button class="timer-btn timer-btn-pause hidden" id="timerPauseBtn" onclick="timerPause()">일시정지</button>
      <button class="timer-btn timer-btn-resume hidden" id="timerResumeBtn" onclick="timerResume()">계속</button>
      <button class="timer-btn timer-btn-stop hidden" id="timerStopBtn" onclick="timerStop()">기록 끝</button>
    </div>

    <div class="timer-manual-toggle" onclick="toggleManualEntry()">
      <span id="manualToggleLabel">+ 직접 시작·종료 시간으로 추가</span>
    </div>

    <div class="field hidden" id="manualEntryFields">
      <label>시작 시간</label>
      <input type="time" id="manualStart">
      <label style="margin-top:10px;">종료 시간</label>
      <input type="time" id="manualEnd">
      <button class="btn-secondary" style="width:100%;margin-top:10px;" onclick="addManualSession()">이 사이클 추가</button>
    </div>

    <div class="sheet-actions" style="margin-top:20px;">
      <button class="btn-cancel" onclick="closeOverlay('menuOverlay')">닫기</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
